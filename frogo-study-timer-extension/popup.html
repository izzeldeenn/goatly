<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>frogo | study timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 320px;
            min-height: 400px;
        }
        
        .container {
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .tagline {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .timer-display {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .time {
            font-size: 36px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
        }
        
        .session-type {
            font-size: 14px;
            padding: 5px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            display: inline-block;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        
        .btn-primary:hover {
            background: #45a049;
        }
        
        .btn-secondary {
            background: #f44336;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #da190b;
        }
        
        .btn-tertiary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .btn-tertiary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .stats {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .stat-label {
            opacity: 0.8;
        }
        
        .stat-value {
            font-weight: bold;
        }
        
        .settings {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
        }
        
        .settings-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .setting-item {
            margin-bottom: 10px;
        }
        
        .setting-label {
            font-size: 12px;
            margin-bottom: 3px;
            opacity: 0.8;
        }
        
        .setting-input {
            width: 100%;
            padding: 5px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
        }
        
        .setting-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .sync-status {
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
            padding: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .sync-connected {
            color: #4CAF50;
        }
        
        .sync-disconnected {
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">frogo</div>
            <div class="tagline">study timer</div>
        </div>
        
        <div class="timer-display">
            <div class="time" id="timerDisplay">25:00</div>
            <div class="session-type" id="sessionType">Work Session</div>
        </div>
        
        <div class="controls">
            <button class="btn btn-primary" id="startBtn">Start</button>
            <button class="btn btn-secondary" id="stopBtn" disabled>Stop</button>
            <button class="btn btn-tertiary" id="resetBtn">Reset</button>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">Completed Sessions:</span>
                <span class="stat-value" id="completedSessions">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Study Time:</span>
                <span class="stat-value" id="totalStudyTime">0h 0m</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Current Streak:</span>
                <span class="stat-value" id="currentStreak">0 days</span>
            </div>
        </div>
        
        <div class="settings">
            <div class="settings-title">Settings</div>
            <div class="setting-item">
                <div class="setting-label">Work Duration (minutes)</div>
                <input type="number" class="setting-input" id="workMinutes" value="25" min="1" max="60">
            </div>
            <div class="setting-item">
                <div class="setting-label">Break Duration (minutes)</div>
                <input type="number" class="setting-input" id="breakMinutes" value="5" min="1" max="30">
            </div>
            <div class="setting-item">
                <div class="setting-label">Long Break Duration (minutes)</div>
                <input type="number" class="setting-input" id="longBreakMinutes" value="15" min="1" max="60">
            </div>
        </div>
        
        <!-- Hash Key Connection Section -->
        <div class="hash-key-section" id="hashKeySection" style="margin-bottom: 15px;">
            <div style="margin-bottom: 10px;">
                <label style="display: block; margin-bottom: 5px; font-size: 12px; opacity: 0.8;">Extension Hash Key</label>
                <input type="password" id="hashKeyInput" placeholder="Enter your hash key..." style="width: 100%; padding: 8px; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; background: rgba(255,255,255,0.1); color: white; font-size: 12px;">
            </div>
            <button class="btn btn-primary" id="connectBtn" style="width: 100%;">Connect with Hash Key</button>
        </div>
        
        <!-- User Connection Section -->
        <div class="user-section" id="userSection" style="display: none; margin-bottom: 15px;">
            <div class="user-info" style="display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(255, 255, 255, 0.1); border-radius: 8px;">
                <img id="userAvatar" style="width: 32px; height: 32px; border-radius: 50%; display: none;" alt="User Avatar">
                <div style="flex: 1;">
                    <div id="userName" style="font-weight: bold; font-size: 14px;">User Name</div>
                    <div style="font-size: 12px; opacity: 0.8;">Connected to frogo</div>
                </div>
                <button class="btn btn-tertiary" id="disconnectBtn" style="padding: 5px 10px; font-size: 12px;">Disconnect</button>
            </div>
        </div>
        
        <div class="sync-status" id="syncStatus">
            <span id="syncText">Checking frogo connection...</span>
        </div>
    </div>
    
    <script src="auth.js"></script>
    <script src="popup.js"></script>
</body>
</html>
